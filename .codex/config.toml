model = "gpt-5.4"
model_reasoning_effort = "medium"

# AGENTS.md 準拠: default(手動) / full_auto(標準) / yolo(限定強権限)
[profiles.default]
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.full_auto]
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "danger-full-access"

# Windows / Linux (SSH) 両対応のため PATH 解決に委ねる
# pwsh 7+ を両環境の PATH 先頭に配置する前提
[shell]
program = "pwsh"
args = ["-NoLogo", "-NoProfile", "-NonInteractive"]
