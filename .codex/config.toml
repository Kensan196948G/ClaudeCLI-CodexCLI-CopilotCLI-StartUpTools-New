model = "gpt-5.4"
model_reasoning_effort = "medium"

[profiles.default]
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.full_auto]
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "danger-full-access"

[shell]
program = "pwsh.exe"
# command と program のどちらか片方に統一
# command = "pwsh.exe" でもよいが、どちらかだけにする
args = [
    "-NoLogo",
    "-NoProfile",
    "-NonInteractive",
]

